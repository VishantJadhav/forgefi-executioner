name: ForgeFi Executioner Bot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  sweep-and-slash:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # FIX: Updated to Node 24 to clear the warning

      - name: Install Dependencies
        run: npm install

      - name: Execute Slashing Script
        env:
          EXECUTIONER_PRIVATE_KEY: ${{ secrets.EXECUTIONER_PRIVATE_KEY }}
          PROGRAM_ID: ${{ secrets.PROGRAM_ID }}
        # FIX: Using npx guarantees it finds ts-node even if not installed globally
        run: npx ts-node crank.ts